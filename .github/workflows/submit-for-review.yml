name: Submit drafts for review

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS payload as JSON
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Open or update review pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          existing_pr="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head drafts \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$existing_pr" ]]; then
            echo "Review pull request already open: #$existing_pr"
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head drafts \
            --title "Review content drafts" \
            --body "Pages CMS drafts are ready for review. Merge this PR to publish approved content changes."
